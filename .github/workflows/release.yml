name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Android / Linux only: Java + Android SDK ──────────────────────────
      - name: Setup Java 17
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build Vite app
        run: bun run build

      # ── Linux: Electron AppImage ──────────────────────────────────────────
      - name: Build Electron (Linux AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*.AppImage

      # ── Android: Capacitor APK ────────────────────────────────────────────
      - name: Build Android APK (debug)
        if: matrix.os == 'ubuntu-latest'
        env:
          _JAVA_OPTIONS: -Xmx4g
        run: |
          npx cap telemetry off
          cp android/gradle.properties /tmp/gradle.properties
          rm -rf android
          npx cap add android
          cp /tmp/gradle.properties android/gradle.properties
          npx cap sync android
          sed -i "s/kotlin_version = ['\"][^'\"]*['\"]/kotlin_version = '1.9.22'/" android/build.gradle
          cd android && ./gradlew wrapper --gradle-version 8.7
          cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

      # ── Windows: Electron .exe installer ─────────────────────────────────
      - name: Build Electron (Windows .exe)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          allowUpdates: true
          generate_release_notes: true
          files: |
            artifacts/linux-dist/*.AppImage
            artifacts/windows-dist/*.exe
            artifacts/android-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

